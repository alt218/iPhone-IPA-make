name: Build iOS IPA

on:
  push:
    branches: ["main", "master"]
  pull_request:
  workflow_dispatch:

jobs:
  build:
    runs-on: macos-15

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Select Xcode
        uses: maxim-lobanov/setup-xcode@v1
        with:
          xcode-version: latest-stable

      - name: Show Xcode Version
        run: xcodebuild -version

      - name: Install XcodeGen
        run: brew install xcodegen

      - name: Generate Project
        run: xcodegen generate

      - name: Build Release App
        run: |
          set -o pipefail
          xcodebuild \
            -project IPAInjectoriOS.xcodeproj \
            -scheme IPAInjectoriOS \
            -configuration Release \
            -sdk iphoneos \
            -derivedDataPath build \
            CODE_SIGNING_ALLOWED=NO \
            CODE_SIGNING_REQUIRED=NO \
            CODE_SIGN_IDENTITY="" \
            build | tee xcodebuild.log

      - name: Package IPA
        run: |
          mkdir -p Payload
          cp -R build/Build/Products/Release-iphoneos/IPAInjectoriOS.app Payload/
          ditto -c -k --sequesterRsrc --keepParent Payload IPAInjectoriOS.ipa

      - name: Upload Artifact
        uses: actions/upload-artifact@v4
        with:
          name: IPAInjectoriOS-unsigned
          path: IPAInjectoriOS.ipa

      - name: Show Build Errors
        if: always()
        run: |
          if [ -f xcodebuild.log ]; then
            echo "==== xcodebuild error lines ===="
            grep -n "error:" xcodebuild.log || true
            echo "==== SwiftCompile lines ===="
            grep -n "SwiftCompile" xcodebuild.log || true
            echo "==== Last 200 lines ===="
            tail -n 200 xcodebuild.log || true
          fi

      - name: Upload Build Log
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xcodebuild-log
          path: xcodebuild.log
